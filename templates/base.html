<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis - {% block title %}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="brand-icon">🧠</span>
            <span class="brand-text">Sentiment Analysis</span>
        </div>
        <div class="nav-links">
            <a href="/sentiment_analysis/image" class="nav-link {% block nav_image %}{% endblock %}" id="nav-image">
                <span class="nav-icon">🖼️</span>
                Image
            </a>
            <a href="/sentiment_analysis/webcam" class="nav-link {% block nav_webcam %}{% endblock %}" id="nav-webcam">
                <span class="nav-icon">📷</span>
                Webcam
            </a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
